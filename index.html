<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>International Trade</title>
    <meta name="description" content="International Trade game for 7th grade social studies" />
    <meta property="og:title" content="International Trade" />
    <meta property="og:description" content="Sail the seas. Harvest riches. Manufacture goods. Outsmart your rivals." />
    <meta property="og:type" content="website" />
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(l) {
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null, l.pathname + decoded + l.hash);
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
